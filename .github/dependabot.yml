# Dependabot configuration for automated dependency update PRs
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/about-the-dependabot-yml-file

version: 2
updates:
  # npm: root and all workspaces
  - package-ecosystem: 'npm'
    target-branch: development
    directories:
      - '/'
      - '/infrastructure'
      - '/backend'
      - '/frontend'
      - '/shared/graphql-types'
      - '/shared/schemas'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions workflows
  - package-ecosystem: 'github-actions'
    target-branch: development
    directory: '/'
    schedule:
      interval: 'weekly'
