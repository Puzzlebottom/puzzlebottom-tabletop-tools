name: Complete Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create tag and release notes
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Get version and create tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          name: Release v${{ steps.version.outputs.version }}

  prepare-teardown:
    name: Sanitize version for teardown
    needs: release
    runs-on: ubuntu-latest
    outputs:
      release_environment: ${{ steps.sanitize.outputs.sanitized }}
    steps:
      - name: Sanitize version
        id: sanitize
        run: |
          SANITIZED=$(echo "${{ needs.release.outputs.version }}" | tr '.' '-')
          echo "sanitized=Release-v${SANITIZED}" >> "$GITHUB_OUTPUT"

  teardown:
    name: Teardown release deployment
    needs: prepare-teardown
    uses: ./.github/workflows/sandbox-teardown.yml
    with:
      release_environment: ${{ needs.prepare-teardown.outputs.release_environment }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
