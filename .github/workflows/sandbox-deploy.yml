name: Deploy Sandbox

on:
  workflow_dispatch:
    inputs:
      sandbox_identifier:
        description: 'Optional override for full sandbox identifier (branch-slug-hash)'
        required: false
        type: string

concurrency:
  group: sandbox-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sandbox_identifier: ${{ steps.identify.outputs.sandbox_identifier }}
      sandbox_environment: ${{ steps.identify.outputs.sandbox_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve sandbox identifier
        id: identify
        shell: bash
        env:
          INPUT_SANDBOX_IDENTIFIER: ${{ github.event.inputs.sandbox_identifier }}
          SANDBOX_DEVELOPER: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_SANDBOX_IDENTIFIER}" ]; then
            SANDBOX_IDENTIFIER="$(./scripts/sandbox-identifier.sh --slugify "${INPUT_SANDBOX_IDENTIFIER}")"
          else
            SANDBOX_IDENTIFIER="$(./scripts/sandbox-identifier.sh)"
          fi

          if [ -z "${SANDBOX_IDENTIFIER}" ]; then
            echo "Failed to compute sandbox identifier."
            exit 1
          fi

          echo "sandbox_identifier=${SANDBOX_IDENTIFIER}" >> "$GITHUB_OUTPUT"
          echo "sandbox_environment=sandbox-${SANDBOX_IDENTIFIER}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ needs.prepare.outputs.sandbox_environment }}
      sandbox-identifier: ${{ needs.prepare.outputs.sandbox_identifier }}
      sandbox-branch: ${{ github.ref_name }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
