name: Teardown Sandbox

on:
  workflow_dispatch:
    inputs:
      sandbox_identifier:
        description: 'Sandbox identifier to tear down (branch-slug-dev-hash)'
        required: false
        type: string
      branch_name:
        description: 'Branch name to tear down all sandboxes for that branch'
        required: false
        type: string
      release_environment:
        description: 'Release environment to tear down (e.g. Release-v1-2-3)'
        required: false
        type: string
  workflow_call:
    inputs:
      sandbox_identifier:
        description: 'Sandbox identifier to tear down (branch-slug-dev-hash)'
        required: false
        type: string
      branch_name:
        description: 'Branch name to tear down all sandboxes for that branch'
        required: false
        type: string
      release_environment:
        description: 'Release environment to tear down (e.g. Release-v1-2-3)'
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        description: IAM role ARN for OIDC authentication
        required: true

concurrency:
  group: sandbox-teardown-${{ inputs.sandbox_identifier || inputs.branch_name || inputs.release_environment || github.event.inputs.sandbox_identifier || github.event.inputs.branch_name || github.event.inputs.release_environment || github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  teardown:
    name: Teardown sandbox resources
    runs-on: ubuntu-latest
    env:
      SANDBOX_IDENTIFIER_INPUT: ${{ inputs.sandbox_identifier || github.event.inputs.sandbox_identifier || '' }}
      BRANCH_NAME_INPUT: ${{ inputs.branch_name || github.event.inputs.branch_name || '' }}
      RELEASE_ENV_INPUT: ${{ inputs.release_environment || github.event.inputs.release_environment || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve teardown mode
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_ENV_INPUT:-}" ]; then
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "prefix=${RELEASE_ENV_INPUT}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SANDBOX_IDENTIFIER=""
          if [ -n "${SANDBOX_IDENTIFIER_INPUT:-}" ]; then
            SANDBOX_IDENTIFIER="$(./scripts/sandbox-identifier.sh --slugify "${SANDBOX_IDENTIFIER_INPUT}")"
          fi

          BRANCH_SLUG=""
          if [ -n "${BRANCH_NAME_INPUT:-}" ]; then
            BRANCH_SLUG="$(./scripts/sandbox-identifier.sh --slugify "${BRANCH_NAME_INPUT}")"
          fi

          if [ -n "${SANDBOX_IDENTIFIER}" ]; then
            echo "mode=exact" >> "$GITHUB_OUTPUT"
            echo "sandbox_identifier=${SANDBOX_IDENTIFIER}" >> "$GITHUB_OUTPUT"
            echo "prefix=sandbox-${SANDBOX_IDENTIFIER}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${BRANCH_SLUG}" ]; then
            echo "mode=branch" >> "$GITHUB_OUTPUT"
            echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
            echo "prefix=sandbox-${BRANCH_SLUG}-" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Either sandbox_identifier, branch_name, or release_environment is required."
          exit 1

      - name: Destroy release environment
        if: steps.resolve.outputs.mode == 'release'
        run: >-
          bash ../scripts/parallel-cdk-destroy.sh
          -c githubOwner=${{ github.repository_owner }}
          -c githubRepo=${{ github.event.repository.name }}
        working-directory: infrastructure
        env:
          ENVIRONMENT: ${{ steps.resolve.outputs.prefix }}

      - name: Destroy exact sandbox
        if: steps.resolve.outputs.mode == 'exact'
        run: >-
          bash ../scripts/parallel-cdk-destroy.sh
          -c githubOwner=${{ github.repository_owner }}
          -c githubRepo=${{ github.event.repository.name }}
        working-directory: infrastructure
        env:
          SANDBOX_IDENTIFIER: ${{ steps.resolve.outputs.sandbox_identifier }}

      - name: Destroy all sandboxes for deleted branch
        if: steps.resolve.outputs.mode == 'branch'
        shell: bash
        run: |
          set -euo pipefail
          PREFIX="${{ steps.resolve.outputs.prefix }}"
          echo "Looking for stacks with prefix: ${PREFIX}"

          STACKS=$(aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE IMPORT_COMPLETE IMPORT_ROLLBACK_COMPLETE \
            --query "StackSummaries[?starts_with(StackName, '${PREFIX}')].StackName" \
            --output text)

          if [ -z "${STACKS}" ] || [ "${STACKS}" = "None" ]; then
            echo "No sandbox stacks found for branch prefix ${PREFIX}."
            exit 0
          fi

          IDENTIFIERS=$(for STACK in ${STACKS}; do
            case "${STACK}" in
              *-AuthStack)
                ENV_NAME="${STACK%-AuthStack}"
                echo "${ENV_NAME#sandbox-}"
                ;;
            esac
          done | sort -u)

          if [ -z "${IDENTIFIERS}" ]; then
            echo "No matching sandbox identifiers found for prefix ${PREFIX}."
            exit 0
          fi

          echo "Found sandbox identifiers:"
          echo "${IDENTIFIERS}"

          GITHUB_OWNER="${{ github.repository_owner }}"
          GITHUB_REPO="${{ github.event.repository.name }}"

          for IDENTIFIER in ${IDENTIFIERS}; do
            echo "Destroying sandbox-${IDENTIFIER}..."
            SANDBOX_IDENTIFIER="${IDENTIFIER}" bash ../scripts/parallel-cdk-destroy.sh \
              -c "githubOwner=${GITHUB_OWNER}" \
              -c "githubRepo=${GITHUB_REPO}"
          done
        working-directory: infrastructure

      - name: Verify cleanup
        run: |
          PREFIX="${{ steps.resolve.outputs.prefix }}"
          STACKS=$(aws cloudformation list-stacks \
            --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE \
            --query "StackSummaries[?starts_with(StackName, '${PREFIX}')].StackName" \
            --output text)
          if [ -n "$STACKS" ]; then
            echo "::warning::Remaining stacks found: $STACKS"
            echo "Attempting force delete of remaining stacks..."
            for STACK in $STACKS; do
              echo "Deleting $STACK..."
              aws cloudformation delete-stack --stack-name "$STACK"
            done
            echo "Waiting for deletions to complete..."
            for STACK in $STACKS; do
              aws cloudformation wait stack-delete-complete --stack-name "$STACK" || true
            done
          else
            echo "All sandbox stacks successfully removed."
          fi
