name: Deploy Release

on:
  push:
    branches:
      - 'release/**'

concurrency:
  group: release-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from branch
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#release/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    outputs:
      version: ${{ steps.version.outputs.version }}

  deploy-infra:
    needs: deploy
    uses: ./.github/workflows/deploy.yml
    with:
      environment: Release-v${{ needs.deploy.outputs.version }}
      ref: ${{ github.ref_name }}
      sandbox-branch: ${{ github.ref_name }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
