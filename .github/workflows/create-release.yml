name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Bump version and create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version --allow-same-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump to staging
        run: |
          git add package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git push origin staging

      - name: Create release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "release" --color "0E8A16" --description "Release PR - creates tag and GitHub Release when merged" 2>/dev/null || true
          gh pr create \
            --base main \
            --head staging \
            --title "Release v${{ steps.bump.outputs.version }}" \
            --body "Release staging to production. Merging will deploy to production and create GitHub Release v${{ steps.bump.outputs.version }}." \
            --label "release"
