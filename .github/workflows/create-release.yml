name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Bump version and create PR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      version_sanitized: ${{ steps.sanitize.outputs.sanitized }}
    steps:
      - name: Checkout staging
        uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version --allow-same-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sanitize version for stack names
        id: sanitize
        run: |
          SANITIZED=$(echo "${{ steps.bump.outputs.version }}" | tr '.' '-')
          echo "sanitized=${SANITIZED}" >> "$GITHUB_OUTPUT"

      - name: Create release branch and push
        run: |
          git checkout -b release/v${{ steps.bump.outputs.version }}
          git add package.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git push -u origin release/v${{ steps.bump.outputs.version }}

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh label create "release" --color "0E8A16" --description "Release PR - creates tag and GitHub Release when merged" 2>/dev/null || true
          gh pr create \
            --base main \
            --head release/v${{ steps.bump.outputs.version }} \
            --title "Release v${{ steps.bump.outputs.version }}" \
            --body "Release v${{ steps.bump.outputs.version }} to production. A Release-v${{ steps.sanitize.outputs.sanitized }} deployment is created for testing. Subsequent pushes to this branch redeploy. Merging will deploy to production, create GitHub Release v${{ steps.bump.outputs.version }}, and tear down the release deployment." \
            --label "release"

  deploy:
    name: Deploy Release-v${{ needs.release.outputs.version_sanitized }}
    needs: release
    uses: ./.github/workflows/deploy.yml
    with:
      environment: Release-v${{ needs.release.outputs.version_sanitized }}
      ref: release/v${{ needs.release.outputs.version }}
      sandbox-branch: release/v${{ needs.release.outputs.version }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
