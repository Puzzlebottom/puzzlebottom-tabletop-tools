name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment name
        required: true
        type: string
      aws-region:
        description: AWS region
        required: false
        type: string
        default: us-east-1
      sandbox-identifier:
        description: Branch-hash identifier for sandbox environments
        required: false
        type: string
        default: ""
      sandbox-branch:
        description: Git branch name for sandbox Amplify builds
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        description: IAM role ARN for OIDC authentication
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Build all workspaces
        run: npm run build

      - name: CDK diff
        run: >-
          npx cdk diff --all
          -c githubOwner=${{ github.repository_owner }}
          -c githubRepo=${{ github.event.repository.name }}
        working-directory: infrastructure
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SANDBOX_IDENTIFIER: ${{ inputs.sandbox-identifier }}
          SANDBOX_BRANCH: ${{ inputs.sandbox-branch }}

      - name: CDK deploy
        run: >-
          npx cdk deploy --all --require-approval never
          -c githubOwner=${{ github.repository_owner }}
          -c githubRepo=${{ github.event.repository.name }}
        working-directory: infrastructure
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SANDBOX_IDENTIFIER: ${{ inputs.sandbox-identifier }}
          SANDBOX_BRANCH: ${{ inputs.sandbox-branch }}
