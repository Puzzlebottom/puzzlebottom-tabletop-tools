name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment name
        required: true
        type: string
      ref:
        description: Git ref to checkout (branch, tag, or SHA)
        required: false
        type: string
        default: ''
      aws-region:
        description: AWS region
        required: false
        type: string
        default: us-east-1
      sandbox-identifier:
        description: Branch-slug identifier for sandbox environments
        required: false
        type: string
        default: ''
      sandbox-branch:
        description: Git branch name for sandbox Amplify builds
        required: false
        type: string
        default: ''
    secrets:
      AWS_ROLE_ARN:
        description: IAM role ARN for OIDC authentication
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Build all workspaces
        run: npm run build

      - name: CDK diff
        run: >-
          npx cdk diff --all
          -c githubOwner=${{ github.repository_owner }}
          -c githubRepo=${{ github.event.repository.name }}
        working-directory: infrastructure
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SANDBOX_IDENTIFIER: ${{ inputs.sandbox-identifier }}
          SANDBOX_BRANCH: ${{ inputs.sandbox-branch }}

      - name: CDK deploy
        run: >-
          npx cdk deploy --all --require-approval never
          -c githubOwner=${{ github.repository_owner }}
          -c githubRepo=${{ github.event.repository.name }}
        working-directory: infrastructure
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SANDBOX_IDENTIFIER: ${{ inputs.sandbox-identifier }}
          SANDBOX_BRANCH: ${{ inputs.sandbox-branch }}

      - name: Trigger Amplify build (sandbox/release)
        if: inputs.sandbox-branch != ''
        run: |
          STACK_NAME="${{ inputs.environment }}-FrontendStack"
          BRANCH_NAME="${{ inputs.sandbox-branch }}"

          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='AmplifyAppId'].OutputValue" \
            --output text)

          echo "Triggering Amplify build for app ${APP_ID} on branch ${BRANCH_NAME}"
          aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-type RELEASE
