type SubmitDataResponse {
  id: ID!
  status: String!
  submittedAt: String!
}

type Mutation {
  submitData(source: String!, payload: String!): SubmitDataResponse!
}

type Query {
  _placeholder: String
}

type Subscription {
  onDataProcessed(id: ID): SubmitDataResponse
    @aws_subscribe(mutations: ["submitData"])
}
