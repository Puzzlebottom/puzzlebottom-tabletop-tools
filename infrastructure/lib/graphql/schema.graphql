enum RollerType {
  gm
  player
}

enum Visibility {
  all
  gm_only
}

enum RollRequestType {
  ad_hoc
  initiative
}

type PlayTable @aws_api_key @aws_cognito_user_pools {
  id: ID!
  gmUserId: String!
  inviteCode: String!
  createdAt: String!
  players: [Player!]
}

type Player @aws_api_key @aws_cognito_user_pools {
  id: ID!
  characterName: String!
  initiativeModifier: Int!
}

type Roll @aws_api_key @aws_cognito_user_pools {
  id: ID!
  playTableId: ID!
  rollerId: String!
  rollerType: RollerType!
  diceType: String!
  values: [Int!]!
  modifier: Int!
  total: Int!
  advantage: String
  dc: Int
  success: Boolean
  visibility: Visibility!
  rollRequestType: RollRequestType!
  rollRequestId: ID
  createdAt: String!
}

type RollDiceResponse @aws_api_key @aws_cognito_user_pools {
  rollId: ID!
  accepted: Boolean!
}

type RollResult @aws_iam @aws_api_key @aws_cognito_user_pools {
  playTableId: ID!
  rollId: ID!
  values: [Int!]!
  modifier: Int!
  total: Int!
  advantage: String
  dc: Int
  success: Boolean
  visibility: Visibility!
}

type RollRequest @aws_iam @aws_api_key @aws_cognito_user_pools {
  id: ID!
  playTableId: ID!
  targetPlayerIds: [String!]!
  type: RollRequestType!
  dc: Int
  advantage: String
  isPrivate: Boolean!
  status: String!
  createdAt: String!
}

type InitiativeEntry @aws_iam @aws_api_key @aws_cognito_user_pools {
  id: ID!
  characterName: String!
  value: Int!
  modifier: Int!
  total: Int!
}

type InitiativeOrderUpdated @aws_iam @aws_api_key @aws_cognito_user_pools {
  playTableId: ID!
  order: [InitiativeEntry!]!
}

input InitiativeEntryInput {
  id: ID!
  characterName: String!
  value: Int!
  modifier: Int!
  total: Int!
}

type JoinPlayTableResponse @aws_api_key @aws_cognito_user_pools {
  id: ID!
  playTableId: ID!
}

input JoinPlayTableInput {
  characterName: String!
  initiativeModifier: Int!
}

input RollDiceInput {
  id: String
  diceType: String!
  advantage: String
  modifier: Int
  dc: Int
  visibility: String
  rollRequestId: ID
}

input CreateRollRequestInput {
  targetPlayerIds: [String!]!
  type: RollRequestType!
  dc: Int
  advantage: String
  isPrivate: Boolean
}

input NotifyRollRequestInput {
  id: ID!
  playTableId: ID!
  targetPlayerIds: [String!]!
  type: RollRequestType!
  dc: Int
  advantage: String
  isPrivate: Boolean!
  status: String!
  createdAt: String!
}

input RollResultInput {
  playTableId: ID!
  rollId: ID!
  values: [Int!]!
  modifier: Int!
  total: Int!
  advantage: String
  dc: Int
  success: Boolean
  visibility: Visibility!
}

type RollConnection @aws_api_key @aws_cognito_user_pools {
  items: [Roll!]!
  nextToken: String
}

type Query {
  playTable(id: ID!): PlayTable
  playTableByInviteCode(inviteCode: String!): PlayTable
    @aws_api_key
    @aws_cognito_user_pools
  rollHistory(playTableId: ID!, limit: Int, nextToken: String): RollConnection
    @aws_api_key
    @aws_cognito_user_pools
}

type Mutation {
  createPlayTable: PlayTable!
  joinPlayTable(
    inviteCode: String!
    input: JoinPlayTableInput!
  ): JoinPlayTableResponse! @aws_api_key @aws_cognito_user_pools
  leavePlayTable(playTableId: ID!, playerId: String!): Boolean!
    @aws_api_key
    @aws_cognito_user_pools
  rollDice(playTableId: ID!, input: RollDiceInput!): RollDiceResponse!
    @aws_api_key
    @aws_cognito_user_pools
  createRollRequest(
    playTableId: ID!
    input: CreateRollRequestInput!
  ): RollRequest!
  fulfillRollRequest(
    rollRequestId: ID!
    playTableId: ID!
    playerId: String!
  ): RollDiceResponse! @aws_api_key @aws_cognito_user_pools
  clearInitiative(playTableId: ID!): Boolean!
  notifyRollCompleted(input: RollResultInput!): RollResult! @aws_iam
  notifyRollRequestCreated(input: NotifyRollRequestInput!): RollRequest!
    @aws_iam
  notifyInitiativeUpdated(
    playTableId: ID!
    order: [InitiativeEntryInput!]!
  ): InitiativeOrderUpdated!
}

type Subscription {
  onRollCompleted(playTableId: ID!): RollResult
    @aws_subscribe(mutations: ["notifyRollCompleted"])
    @aws_iam
    @aws_api_key
    @aws_cognito_user_pools
  onRollRequestCreated(playTableId: ID!): RollRequest
    @aws_subscribe(mutations: ["notifyRollRequestCreated"])
    @aws_iam
    @aws_api_key
    @aws_cognito_user_pools
  onInitiativeUpdated(playTableId: ID!): InitiativeOrderUpdated
    @aws_subscribe(mutations: ["notifyInitiativeUpdated"])
    @aws_iam
    @aws_api_key
    @aws_cognito_user_pools
}
