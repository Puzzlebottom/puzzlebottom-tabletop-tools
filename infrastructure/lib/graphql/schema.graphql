type PlayTable @aws_api_key @aws_cognito_user_pools {
  id: ID!
  gmUserId: String!
  inviteCode: String!
  createdAt: String!
  deletedAt: String
  players: [Player!]
}

type Player @aws_api_key @aws_cognito_user_pools {
  id: ID!
  playTableId: ID
  characterName: String!
  initiativeModifier: Int!
  createdAt: String!
  deletedAt: String
}

input JoinPlayTableInput {
  characterName: String!
  initiativeModifier: Int!
}

type Query {
  playTable(id: ID!): PlayTable
  playTableByInviteCode(inviteCode: String!): PlayTable @aws_api_key @aws_cognito_user_pools
  rollHistory(playTableId: ID!, playerId: ID, limit: Int, nextToken: String): PaginatedRolls @aws_api_key @aws_cognito_user_pools
}

type Mutation {
  createPlayTable: PlayTable!
  joinPlayTable(inviteCode: String!, input: JoinPlayTableInput!): PlayTable! @aws_api_key @aws_cognito_user_pools
  leavePlayTable(playTableId: ID!, playerId: String!): Boolean! @aws_api_key @aws_cognito_user_pools
  createRoll(playTableId: ID!, playerId: ID, input: CreateRollInput!): Roll! @aws_api_key @aws_cognito_user_pools
  createRollRequest(playTableId: ID!, input: CreateRollRequestInput!): RollRequest!
  clearInitiative(playTableId: ID!): Boolean!
  publishRollCompleted(input: PublishRollInput!): Roll! @aws_iam
  publishRollRequestCreated(input: PublishRollRequestInput!): RollRequest! @aws_iam
  publishInitiativeUpdated(input: PublishInitiativeUpdatedInput!): [Roll]! @aws_iam
}

enum RollType {
  initiative
}

type Roll @aws_iam @aws_api_key @aws_cognito_user_pools {
  id: ID!
  playTableId: ID!
  rollerId: String!
  rollNotation: String!
  type: RollType
  values: [Int!]!
  modifier: Int!
  rollResult: Int!
  isPrivate: Boolean!
  rollRequestId: ID
  createdAt: String!
  deletedAt: String
}

type RollRequest @aws_iam @aws_api_key @aws_cognito_user_pools {
  id: ID!
  playTableId: ID!
  targetPlayerIds: [String!]!
  rolls: [Roll]!
  rollNotation: String!
  type: RollType!
  dc: Int
  isPrivate: Boolean!
  createdAt: String!
  deletedAt: String
}

input CreateRollInput {
  playerId: ID
  rollRequestId: ID
  diceNotation: String!
  modifier: Int!
  isPrivate: Boolean!
}

input CreateRollRequestInput {
  targetPlayerIds: [ID!]!
  type: RollType!
  diceNotation: String!
  dc: Int
  isPrivate: Boolean
}

input PublishRollRequestInput {
  id: ID!
  playTableId: ID!
  targetPlayerIds: [String!]!
  rolls: [PublishRollInput]!
  rollNotation: String!
  type: RollType!
  dc: Int
  isPrivate: Boolean!
  createdAt: String!
  deletedAt: String
}

input PublishRollInput {
  id: ID!
  playTableId: ID!
  rollerId: String!
  rollNotation: String!
  type: RollType
  values: [Int!]!
  modifier: Int!
  rollResult: Int!
  isPrivate: Boolean!
  rollRequestId: ID
  createdAt: String!
  deletedAt: String
}

input PublishInitiativeUpdatedInput {
  rolls: [PublishRollInput]!
}

type PaginatedRolls @aws_api_key @aws_cognito_user_pools {
  items: [Roll!]!
  nextToken: String
}

type Subscription {
  rollCompleted(playTableId: ID!): Roll @aws_subscribe(mutations: ["publishRollCompleted"]) @aws_iam @aws_api_key @aws_cognito_user_pools
  rollRequestCreated(playTableId: ID!): RollRequest @aws_subscribe(mutations: ["publishRollRequestCreated"]) @aws_iam @aws_api_key @aws_cognito_user_pools
  initiativeUpdated(playTableId: ID!): [Roll]! @aws_subscribe(mutations: ["publishInitiativeUpdated"]) @aws_iam @aws_api_key @aws_cognito_user_pools
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}